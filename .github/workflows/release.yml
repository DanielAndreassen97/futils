name: Release
on:
  push:
    tags:
      - "v*"

# Least privilege at the workflow level; the release job opts into exactly
# the scopes it needs below.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    # Gate the release behind a protected GitHub Environment. Configure
    # "Required reviewers" + tag protection on the `release` environment in
    # repo Settings so a tag push alone can't ship to Homebrew/Scoop without
    # a human approval. (The environment is auto-created on first run; add the
    # protection rules in the UI — they can't be set from this file.)
    environment: release
    permissions:
      contents: write # create the GitHub Release and upload artifacts
      id-token: write # OIDC token used to sign the build-provenance attestation
      attestations: write # publish the provenance attestation to the attestations API
    steps:
      # Actions are pinned to immutable commit SHAs (not mutable @vN tags) so a
      # compromised upstream that re-points a tag can't inject code into a job
      # that holds the cross-repo publish token. Dependabot (.github/dependabot.yml)
      # bumps these via reviewable PRs. The trailing comment is the human-readable
      # version the SHA corresponds to.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      # Provides the `syft` binary that GoReleaser's `sboms:` block shells out to.
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          # Pin the GoReleaser binary to an exact release (never `latest`) so a
          # newest-release compromise can't run in this token-holding job. Bump
          # deliberately when upgrading.
          version: "v2.16.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
      # Signed SLSA build provenance for every released archive + the checksum
      # file, so downstream users can cryptographically verify what they
      # download came from this workflow:
      #   gh attestation verify <file> --repo DanielAndreassen97/futils
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
